version: "3.8"

services:
    postgres:
        image: postgres:18-alpine
        container_name: etrs-postgres
        restart: always
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "${POSTGRES_EXTERNAL_PORT:-5437}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql

    pgadmin:
        image: dpage/pgadmin4
        container_name: etrs-pgadmin
        restart: always
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
        ports:
            - "${PGADMIN_EXTERNAL_PORT:-5050}:80"
        depends_on:
            - postgres

    db:
        image: mcr.microsoft.com/mssql/server:2022-latest
        container_name: event-db
        ports:
            - "${MSSQL_EXTERNAL_PORT:-1433}:1433"
        environment:
            - ACCEPT_EULA=Y
            - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
        volumes:
            - sql-data:/var/opt/mssql

    rabbitmq:
        image: rabbitmq:3-management-alpine
        container_name: etrs-rabbitmq
        restart: always
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
        ports:
            - "5672:5672"
            - "15672:15672"

    auth-service:
        build:
            context: ./event-ticket-auth-service
            dockerfile: Dockerfile
        environment:
            ASPNETCORE_ENVIRONMENT: Development
            JWT_KEY: ${JWT_KEY}
            JWT_ISSUER: ${JWT_ISSUER}
            JWT_AUDIENCE: ${JWT_AUDIENCE}
        ports:
            - "8080:8080"
            - "8181:8181"

    mock-auth-server:
        image: wiremock/wiremock:3.13.2
        container_name: mock-auth-server
        ports:
            - "5005:8080"
        command: >
            --global-response-templating
        volumes:
            - ./event-ticket-main-services/wiremock/mappings:/home/wiremock/mappings

volumes:
    postgres_data:
    sql-data:
