server:
  port: 8082

spring:
  application:
    name: order-service
  sql:
    init:
      mode: always

  rabbitmq:
    host: localhost
    port: 5672

  r2dbc:
    url: r2dbc:postgresql://localhost:5437/tickets_db
    username: myuser
    password: mypassword

  cloud:
    function:
      definition: paymentEvents
    stream:
      bindings:
        paymentEvents-in-0:
          destination: payment.completed.events
          group: order-service-group
          consumer:
            max-attempts: 5
      rabbit:
        bindings:
          paymentEvents-in-0:
            consumer:
              auto-bind-dlq: true
              requeue-rejected: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:5000
